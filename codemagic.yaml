workflows:
  react-native-android:
    name: Build Colab APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    working_directory: frontend-colab
    environment:
      node: 18
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Android
        script: |
          npx expo prebuild --platform android --clean
          cd android
          ./gradlew assembleRelease
    artifacts:
      - frontend-colab/android/app/build/outputs/**/*.apk

  kaggle-android:
    name: Build Kaggle APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    working_directory: frontend-kaggle
    environment:
      node: 18
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Android
        script: |
          npx expo prebuild --platform android --clean
          cd android
          ./gradlew assembleRelease
    artifacts:
      - frontend-kaggle/android/app/build/outputs/**/*.apk
