name: Build APKs (Colab + Kaggle)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-colab-apk:
    name: Build Colab Mobile APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend-colab
        run: npm install

      - name: Generate Android project (expo prebuild)
        working-directory: frontend-colab
        run: npx expo prebuild --platform android --clean --no-install

      - name: Make Gradlew executable
        working-directory: frontend-colab/android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: frontend-colab/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Colab APK
        uses: actions/upload-artifact@v4
        with:
          name: colab-mobile-apk
          path: frontend-colab/android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30

  build-kaggle-apk:
    name: Build Kaggle Mobile APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend-kaggle
        run: npm install

      - name: Generate Android project (expo prebuild)
        working-directory: frontend-kaggle
        run: npx expo prebuild --platform android --clean --no-install

      - name: Make Gradlew executable
        working-directory: frontend-kaggle/android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: frontend-kaggle/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Kaggle APK
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-mobile-apk
          path: frontend-kaggle/android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30
