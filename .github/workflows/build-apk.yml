name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allows manual trigger

jobs:
  build-colab:
    name: Build Colab APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-colab
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-colab/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive --local

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: colab-mobile-apk
          path: frontend-colab/*.apk
          retention-days: 30

  build-kaggle:
    name: Build Kaggle APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-kaggle
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-kaggle/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive --local

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-mobile-apk
          path: frontend-kaggle/*.apk
          retention-days: 30
