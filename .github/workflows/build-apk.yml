name: Build APKs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-colab:
    name: Build Colab APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend-colab
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/ngrok

      - name: Prebuild Android
        working-directory: frontend-colab
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        working-directory: frontend-colab/android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: colab-mobile.apk
          path: frontend-colab/android/app/build/outputs/apk/release/*.apk

  build-kaggle:
    name: Build Kaggle APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend-kaggle
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/ngrok

      - name: Prebuild Android
        working-directory: frontend-kaggle
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        working-directory: frontend-kaggle/android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-mobile.apk
          path: frontend-kaggle/android/app/build/outputs/apk/release/*.apk
